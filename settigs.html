<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <style>
    * {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: #f4f4f4;
}

.settings-container {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 220px;
  background: #222;
  color: #fff;
  padding: 20px;
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar li {
  padding: 10px 0;
  cursor: pointer;
}

.sidebar li:hover {
  color: #00bcd4;
}

.content {
  flex: 1;
  background: #fff;
  padding: 30px;
}

.setting-item {
  display: flex;
  flex-direction: column;
  margin-bottom: 20px;
}

.setting-item label {
  margin-bottom: 5px;
  font-weight: bold;
}

.setting-item input {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

.save-btn {
  padding: 12px 20px;
  background: #00bcd4;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.save-btn:hover {
  background: #0097a7;
}

  </style>
</head>
<body>

  <div class="settings-container">
    <aside class="sidebar">
      <h2>Settings</h2>
      <ul>
        <li>Profile</li>
        <li>Account</li>
        <li>Privacy</li>
        <li>Notifications</li>
      </ul>
    </aside>

    <main class="content">
      <h1>Profile Settings</h1>

      <div class="setting-item">
        <label>Username</label>
        <input type="text" placeholder="Enter username">
      </div>

      <div class="setting-item">
        <label>Email</label>
        <input type="email" placeholder="Enter email">
      </div>

      <button class="save-btn">Save Changes</button>
    </main>
  </div>

</body>
</html>
